<script>
(async function loadScores() {
    const grid = document.getElementById('matchesGrid');
    
    // Mock fallback data (agar API fail ho)
    const mockMatches = [
        { name: "IPL 2026 - Match 51", venue: "Wankhede Stadium, Mumbai", status: "LIVE", dateTimeGMT: new Date(), matchStarted: true },
        { name: "India vs England - 2nd Test", venue: "Lord's, London", status: "UPCOMING", dateTimeGMT: new Date(Date.now() + 7200000), matchStarted: false },
        { name: "Big Bash League - Final", venue: "SCG, Sydney", status: "COMPLETED", dateTimeGMT: new Date(Date.now() - 86400000), matchStarted: true, matchEnded: true }
    ];
    
    try {
        const API_KEY = '8e37d7c2-4b7d-450e-ba82-28fd7f461d4d';
        const response = await fetch(`https://api.cricapi.com/v1/currentMatches?apikey=${API_KEY}&offset=0`);
        const data = await response.json();
        
        if (data && data.data && data.data.length > 0) {
            grid.innerHTML = data.data.map(m => `
                <div class="match-card">
                    <span class="status-badge">${m.status ? m.status.toUpperCase() : (m.matchStarted ? 'LIVE' : 'UPCOMING')}</span>
                    <h3>${m.name || m.series || 'Cricket Match'}</h3>
                    <p>📍 ${m.venue || 'Venue TBA'}</p>
                    <p>⏱️ ${m.matchStarted ? (m.matchEnded ? 'Match Ended' : '🔥 Live Now') : 'Starts: ' + (m.dateTimeGMT ? new Date(m.dateTimeGMT).toLocaleString() : 'Soon')}</p>
                </div>
            `).join('');
        } else {
            throw new Error('No data');
        }
    } catch (error) {
        console.warn('Using fallback data');
        grid.innerHTML = mockMatches.map(m => `
            <div class="match-card">
                <span class="status-badge">${m.status}</span>
                <h3>${m.name}</h3>
                <p>📍 ${m.venue}</p>
                <p>⏱️ ${m.matchStarted ? (m.status === 'COMPLETED' ? 'Completed' : 'Live Now') : 'Upcoming'}</p>
            </div>
        `).join('');
        const note = document.createElement('div');
        note.style.cssText = 'text-align:center; margin-top:20px; font-size:0.85rem; color:#aaa; grid-column:1/-1;';

        grid.appendChild(note);
    }
})();
