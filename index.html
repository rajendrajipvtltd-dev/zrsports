    <script>
        // API loading logic
        async function loadScores() {
            const API_KEY = '8e37d7c2-4b7d-450e-ba82-28fd7f461d4d';
            const API_URL = `https://api.cricapi.com/v1/currentMatches?apikey=${API_KEY}&offset=0`;
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                const grid = document.getElementById('matchesGrid');
                let html = '';
                if(data.data) {
                    data.data.slice(0, 6).forEach(m => {
                        html += `<div class="match-card">
                            <h3>${m.name}</h3>
                            <p>${m.status}</p>
                            <p style="font-size:0.8rem; color:#aaa;">📍 ${m.venue}</p>
                        </div>`;
                    });
                    grid.innerHTML = html;
                }
            } catch (e) { console.error("API Error", e); }
        }
        loadScores();
