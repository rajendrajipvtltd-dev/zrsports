    <style>
        :root {
            --bg-primary: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --bg-card: rgba(30, 41, 59, 0.85);
            --accent: #00c853;
            --accent-glow: #00e676;
            --gold: #ffab00;
            --text-primary: #e8eaed;
            --whatsapp: #25d366;
            --border: #334155;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; }
        
        .top-bar { background: rgba(17, 24, 39, 0.9); padding: 10px 20px; position: sticky; top: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .logo-section { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 1.4rem; }
        .logo-icon { background: var(--accent); color: #000; padding: 5px 10px; border-radius: 8px; }
        
        .whatsapp-btn-top { background: var(--whatsapp); color: #fff; text-decoration: none; padding: 8px 15px; border-radius: 20px; font-weight: 700; font-size: 0.9rem; }
        
        .main-container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .matches-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; margin-top: 20px; }
        
        .match-card { background: var(--bg-card); border-radius: 15px; border: 1px solid var(--border); padding: 15px; transition: 0.3s; }
        .match-card:hover { border-color: var(--accent); transform: translateY(-3px); }
        .status-badge { float: right; font-size: 0.7rem; padding: 3px 8px; border-radius: 10px; background: rgba(255,255,255,0.1); }
        
        .floating-whatsapp { position: fixed; bottom: 20px; right: 20px; background: var(--whatsapp); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

    <header class="top-bar">
        <div class="logo-section"><div class="logo-icon">ZR</div> ZRSPORTS</div>

    </header>

    <main class="main-container">

    </a>

    <script>
        async function loadScores() {
            const API_KEY = '8e37d7c2-4b7d-450e-ba82-28fd7f461d4d';
            const API_URL = `https://api.cricapi.com/v1/currentMatches?apikey=${API_KEY}&offset=0`;
            const grid = document.getElementById('matchesGrid');
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                if (data.data && data.data.length > 0) {
                    grid.innerHTML = data.data.map(m => `
                        <div class="match-card">
                            <span class="status-badge">${m.status.toUpperCase()}</span>
                            <h3 style="color:var(--gold); margin-bottom:10px;">${m.name}</h3>
                            <p style="font-size:0.9rem;">📍 ${m.venue}</p>
                            <p style="margin-top:10px; font-weight:bold;">${m.matchStarted ? 'Match Live' : 'Starts at: ' + new Date(m.dateTimeGMT).toLocaleString()}</p>
                        </div>
                    `).join('');
                } else {
                    grid.innerHTML = '<p>No live matches at the moment.</p>';
                }
            } catch (e) {
                grid.innerHTML = '<p>Error loading scores. Please refresh.</p>';
            }
        }
        loadScores();
        setInterval(loadScores, 60000); // Har minute update hoga
    </script>
</body>
